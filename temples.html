<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 – Temple Album – Andres Pluska</title>
    <meta name="description" content="WDD 131 – Temple Album project. Andres Pluska, Lima, Peru. A dynamic web gallery showcasing beautiful Latter-day Saint temples.">

    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css" media="(min-width: 768px)">

<body>

        <span id="site-title">Temple Album</span>
        <button id="menu" aria-label="Menu"></button>

            <figure>

    <footer>
        <p>&copy; <span id="currentyear"></span> Andres Pluska - Lima, Peru.</p>
