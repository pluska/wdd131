<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Sun Gradients -->
    <linearGradient id="sun-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEB3B" />
      <stop offset="40%" stop-color="#FFC107" />
      <stop offset="100%" stop-color="#FF5722" />
    </linearGradient>
    <linearGradient id="ray-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEB3B" />
      <stop offset="100%" stop-color="#FFC107" />
    </linearGradient>

    <!-- Cloud Gradient -->
    <linearGradient id="cloud-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="70%" stop-color="#ECEFF1" />
      <stop offset="100%" stop-color="#CFD8DC" />
    </linearGradient>

    <!-- Filters for Depth -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="145%" height="145%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#1A237E" flood-opacity="0.15" />
    </filter>
    
    <filter id="sun-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Sun Component -->
  <g id="sun" filter="url(#sun-glow)">
    <!-- Sun Rays -->
    <g stroke="url(#ray-grad)" stroke-width="4.5" stroke-linecap="round">
      <!-- Vertical and Horizontal Rays -->
      <line x1="40" y1="25" x2="40" y2="17" />
      <line x1="40" y1="67" x2="40" y2="75" />
      <line x1="19" y1="46" x2="11" y2="46" />
      <line x1="61" y1="46" x2="69" y2="46" />
      
      <!-- Diagonal Rays -->
      <line x1="25.1" y1="31.1" x2="19.5" y2="25.5" />
      <line x1="54.9" y1="31.1" x2="60.5" y2="25.5" />
      <line x1="25.1" y1="60.9" x2="19.5" y2="66.5" />
      <line x1="54.9" y1="60.9" x2="60.5" y2="66.5" />
    </g>
    
    <!-- Sun Core -->
    <circle cx="40" cy="46" r="16" fill="url(#sun-grad)" />
  </g>

  <!-- Cloud Component -->
  <path d="M 32,80 
           c -8,0 -14,-6 -14,-14 
           c 0,-8 6,-14 14,-14 
           c 2,-10 10,-18 20,-18 
           c 12,0 20,8 20,20 
           c 6,0 12,5 12,12 
           c 0,7 -6,14 -12,14 
           h -40 
           z" 
        fill="url(#cloud-grad)" 
        stroke="#B0BEC5" 
        stroke-width="1.5" 
        stroke-linejoin="round"
        filter="url(#drop-shadow)" />
</svg>
